<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Bing Bingo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .hidden { display: none !important; }
        
        /* Lobby Styles */
        #lobby {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .lobby-header {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lobby-info-box {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .lobby-icon { font-size: 24px; margin-bottom: 5px; }
        .lobby-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .lobby-value { font-size: 28px; font-weight: bold; color: #00d4ff; }
        #lobby-timer-value { color: #ff6b6b; }
        
        /* Cards Grid */
        #lobby-card-ids-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-button {
            aspect-ratio: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card-button:hover { transform: scale(1.05); }
        .selected-card { background: linear-gradient(135deg, #2ecc71, #27ae60); box-shadow: 0 0 15px rgba(46,204,113,0.5); }
        
        /* Card Preview */
        #lobby-card-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .lobby-table {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 300px;
            margin: 0 auto;
        }
        .lobby-table-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        /* Playroom Styles */
        #playroom {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .playroom-header {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .playroom-info-box {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .playroom-main {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .playroom-board {
            flex: 1;
            min-width: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
        }
        .playroom-master-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .playroom-master-header span {
            text-align: center;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
        }
        .header-b { background: #2ecc71; }
        .header-i { background: #f39c12; }
        .header-n { background: #3498db; }
        .header-g { background: #e74c3c; }
        .header-o { background: #9b59b6; }
        
        .playroom-master-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .master-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        .master-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        .master-cell.called { background: #2ecc71; color: #000; }
        
        .playroom-sidebar {
            flex: 1;
            min-width: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
        }
        .playroom-current-call {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .ball {
            width: 80px;
            height: 80px;
            background: #f39c12;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }
        .playroom-last-3-calls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .history-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .ball-b { background: #2ecc71; }
        .ball-i { background: #f39c12; }
        .ball-n { background: #3498db; }
        .ball-g { background: #e74c3c; }
        .ball-o { background: #9b59b6; }
        
        .playroom-card-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
        }
        .bingo-card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .header-cell, .num-cell, .free-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
        }
        .header-cell { background: #667eea; color: white; }
        .num-cell { background: white; color: #333; cursor: pointer; }
        .free-cell { background: #2ecc71; color: white; }
        .num-cell.marked { background: #2ecc71; color: white; }
        
        .bingo-button {
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            display: block;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        
        .popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .lobby-header, .playroom-header { flex-direction: column; }
            #lobby-card-ids-container { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>
    <!-- LOBBY -->
    <div id="lobby">
        <div class="lobby-header">
            <div class="lobby-info-box">
                <div class="lobby-icon">⏳</div>
                <div class="lobby-label">Time</div>
                <div class="lobby-value" id="lobby-timer-value">30</div>
            </div>
            <div class="lobby-info-box">
                <div class="lobby-icon">👥</div>
                <div class="lobby-label">Players</div>
                <div class="lobby-value" id="lobby-player-count">0</div>
            </div>
            <div class="lobby-info-box">
                <div class="lobby-icon">💰</div>
                <div class="lobby-label">Wallet</div>
                <div class="lobby-value" id="lobby-wallet-value">100</div>
            </div>
            <div class="lobby-info-box">
                <div class="lobby-icon">🎲</div>
                <div class="lobby-label">Bet</div>
                <div class="lobby-value" id="lobby-bet-value">10</div>
            </div>
        </div>
        <div id="lobby-card-ids-container"></div>
        <div id="lobby-card-container"></div>
    </div>

    <!-- PLAYROOM -->
    <div id="playroom" class="hidden">
        <div class="playroom-header">
            <div class="playroom-info-box"><div>👥</div><div>Players</div><div id="playroom-players">1</div></div>
            <div class="playroom-info-box"><div>💰</div><div>Jackpot</div><div id="playroom-reward">500</div></div>
            <div class="playroom-info-box"><div>🎲</div><div>Bet</div><div id="playroom-bet-value">10</div></div>
            <div class="playroom-info-box"><div>🔔</div><div>Called</div><div id="playroom-call-count">0</div></div>
        </div>
        <div class="playroom-main">
            <div class="playroom-board">
                <div class="playroom-master-header">
                    <span class="header-b">B</span>
                    <span class="header-i">I</span>
                    <span class="header-n">N</span>
                    <span class="header-g">G</span>
                    <span class="header-o">O</span>
                </div>
                <div class="playroom-master-grid" id="master-grid"></div>
            </div>
            <div class="playroom-sidebar">
                <div class="playroom-current-call">
                    <div>Current Call</div>
                    <div class="ball" id="last-call">-</div>
                </div>
                <div class="playroom-last-3-calls" id="last-3-calls"></div>
                <div class="playroom-card-container" id="playroom-card-container"></div>
                <button class="bingo-button" id="bingo-button">🎯 BINGO! 🎯</button>
            </div>
        </div>
    </div>

    <div class="popup" id="game-popup"><div class="popup-message" id="popup-message"></div></div>

    <script>
        // Game State
        let selectedCardId = null;
        let myCards = [];
        let gameActive = false;
        let calledNumbers = [];
        let callInterval;
        let timer = 30;
        let timerInterval;
        
        // Card data - 500 random bingo cards
        let allCards = [];
        
        // Generate 500 random bingo cards
        function generateAllCards() {
            for (let cardNum = 1; cardNum <= 500; cardNum++) {
                const card = {
                    id: cardNum,
                    grid: generateCardGrid()
                };
                allCards.push(card);
            }
        }
        
        function generateCardGrid() {
            const grid = [[],[],[],[],[]];
            // B: 1-15, I: 16-30, N: 31-45, G: 46-60, O: 61-75
            for (let col = 0; col < 5; col++) {
                const start = col * 15 + 1;
                const end = start + 14;
                const numbers = [];
                for (let i = start; i <= end; i++) numbers.push(i);
                // Shuffle
                for (let i = numbers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
                }
                for (let row = 0; row < 5; row++) {
                    if (row === 2 && col === 2) {
                        grid[row][col] = 0;
                    } else {
                        grid[row][col] = numbers[row];
                    }
                }
            }
            return grid;
        }
        
        // Build card buttons grid
        function buildCardButtons() {
            const container = document.getElementById('lobby-card-ids-container');
            container.innerHTML = '';
            for (let i = 1; i <= 500; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-button';
                btn.textContent = i;
                btn.onclick = () => selectCard(i);
                container.appendChild(btn);
            }
        }
        
        // Select a card
        function selectCard(cardId) {
            // Remove selected class from all
            document.querySelectorAll('.card-button').forEach(btn => {
                btn.classList.remove('selected-card');
            });
            // Add selected class to clicked
            const btn = document.querySelector(`.card-button[onclick="selectCard(${cardId})"]`);
            if (btn) btn.classList.add('selected-card');
            
            selectedCardId = cardId;
            const card = allCards.find(c => c.id === cardId);
            if (card) {
                renderCardPreview(card);
            }
            showPopupMessage(`Card ${cardId} selected! Click BUY to purchase.`);
        }
        
        // Buy selected card
        function buyCard() {
            if (!selectedCardId) {
                showPopupMessage('Please select a card first!');
                return;
            }
            const wallet = parseInt(document.getElementById('lobby-wallet-value').textContent);
            const betAmount = 10;
            if (wallet < betAmount) {
                showPopupMessage('Insufficient balance! Please deposit.');
                return;
            }
            
            const card = allCards.find(c => c.id === selectedCardId);
            if (card && !myCards.find(c => c.id === selectedCardId)) {
                myCards.push(card);
                document.getElementById('lobby-wallet-value').textContent = wallet - betAmount;
                showPopupMessage(`Card ${selectedCardId} purchased! Total cards: ${myCards.length}`);
                
                // Mark card button as owned
                const btn = document.querySelector(`.card-button[onclick="selectCard(${selectedCardId})"]`);
                if (btn) {
                    btn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
                }
                
                if (myCards.length === 1) {
                    document.getElementById('lobby-player-count').textContent = myCards.length;
                    startGameTimer();
                }
            } else {
                showPopupMessage('Card already purchased or not found!');
            }
        }
        
        // Start game timer
        function startGameTimer() {
            timer = 30;
            const timerEl = document.getElementById('lobby-timer-value');
            timerEl.textContent = timer;
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = timer;
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    startGame();
                }
            }, 1000);
        }
        
        // Start the game
        function startGame() {
            if (myCards.length === 0) {
                showPopupMessage('No cards purchased! Cannot start game.');
                return;
            }
            
            gameActive = true;
            calledNumbers = [];
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('playroom').classList.remove('hidden');
            
            buildMasterGrid();
            renderMyCards();
            startNumberCalling();
        }
        
        // Build master grid
        function buildMasterGrid() {
            const grid = document.getElementById('master-grid');
            grid.innerHTML = '';
            for (let row = 1; row <= 15; row++) {
                const masterRow = document.createElement('div');
                masterRow.className = 'master-row';
                let number = row;
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'master-cell';
                    cell.id = `grid-cell-${number}`;
                    cell.textContent = number;
                    masterRow.appendChild(cell);
                    number += 15;
                }
                grid.appendChild(masterRow);
            }
        }
        
        // Render player's cards
        function renderMyCards() {
            const container = document.getElementById('playroom-card-container');
            container.innerHTML = '';
            
            myCards.forEach((card, idx) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bingo-card-grid';
                cardDiv.style.marginBottom = '20px';
                cardDiv.style.border = '1px solid rgba(255,255,255,0.2)';
                cardDiv.style.padding = '10px';
                cardDiv.style.borderRadius = '12px';
                
                // Header
                const colors = { B: '#2ecc71', I: '#f39c12', N: '#3498db', G: '#e74c3c', O: '#9b59b6' };
                ['B','I','N','G','O'].forEach(letter => {
                    const header = document.createElement('div');
                    header.className = 'header-cell';
                    header.textContent = letter;
                    header.style.backgroundColor = colors[letter];
                    cardDiv.appendChild(header);
                });
                
                // Grid
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        const num = card.grid[row][col];
                        const cell = document.createElement('div');
                        if (num === 0) {
                            cell.className = 'free-cell';
                            cell.textContent = '⭐';
                        } else {
                            cell.className = 'num-cell';
                            cell.textContent = num;
                            cell.id = `card-${card.id}-cell-${num}`;
                        }
                        cardDiv.appendChild(cell);
                    }
                }
                
                const cardIdLabel = document.createElement('div');
                cardIdLabel.style.textAlign = 'center';
                cardIdLabel.style.marginTop = '10px';
                cardIdLabel.style.fontSize = '12px';
                cardIdLabel.style.color = '#888';
                cardIdLabel.textContent = `Board #: ${card.id}`;
                cardDiv.appendChild(cardIdLabel);
                
                container.appendChild(cardDiv);
            });
        }
        
        // Start calling numbers
        function startNumberCalling() {
            let available = [];
            for (let i = 1; i <= 75; i++) available.push(i);
            
            callInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (available.length === 0) {
                    clearInterval(callInterval);
                    showPopupMessage('Game Over! No more numbers.');
                    return;
                }
                
                const idx = Math.floor(Math.random() * available.length);
                const number = available.splice(idx, 1)[0];
                calledNumbers.push(number);
                
                // Update current call display
                let letter = '';
                if (number < 16) letter = 'B';
                else if (number < 31) letter = 'I';
                else if (number < 46) letter = 'N';
                else if (number < 61) letter = 'G';
                else letter = 'O';
                document.getElementById('last-call').textContent = `${letter}-${number}`;
                document.getElementById('playroom-call-count').textContent = calledNumbers.length;
                
                // Update last 3 calls
                const lastThree = calledNumbers.slice(-3);
                const container = document.getElementById('last-3-calls');
                container.innerHTML = '';
                lastThree.forEach(call => {
                    const ball = document.createElement('div');
                    ball.classList.add('history-ball');
                    let l = '';
                    if (call < 16) l = 'B';
                    else if (call < 31) l = 'I';
                    else if (call < 46) l = 'N';
                    else if (call < 61) l = 'G';
                    else l = 'O';
                    ball.classList.add(`ball-${l.toLowerCase()}`);
                    ball.textContent = `${l}-${call}`;
                    container.appendChild(ball);
                });
                
                // Update master grid
                const cell = document.getElementById(`grid-cell-${number}`);
                if (cell) cell.classList.add('called');
                
                // Mark on player cards
                myCards.forEach(card => {
                    for (let row = 0; row < 5; row++) {
                        for (let col = 0; col < 5; col++) {
                            const num = card.grid[row][col];
                            if (num === number) {
                                const markCell = document.getElementById(`card-${card.id}-cell-${num}`);
                                if (markCell) markCell.classList.add('marked');
                            }
                        }
                    }
                });
                
                // Check for Bingo (simplified)
                checkForBingo();
                
            }, 3000);
        }
        
        function checkForBingo() {
            // Simple check - just for demonstration
            // In real game, would check patterns
        }
        
        function claimBingo() {
            if (!gameActive) {
                showPopupMessage('Game not active!');
                return;
            }
            if (calledNumbers.length < 4) {
                showPopupMessage('Wait for at least 4 numbers!');
                return;
            }
            
            showPopupMessage('🎉 BINGO CLAIMED! 🎉\nYou won!');
            gameActive = false;
            clearInterval(callInterval);
            
            // Show winner modal
            alert('🎉 CONGRATULATIONS! YOU WON! 🎉');
            
            // Reset game
            setTimeout(() => {
                resetGame();
            }, 3000);
        }
        
        function resetGame() {
            myCards = [];
            selectedCardId = null;
            gameActive = false;
            calledNumbers = [];
            if (callInterval) clearInterval(callInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            document.getElementById('playroom').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('lobby-timer-value').textContent = '30';
            document.getElementById('lobby-player-count').textContent = '0';
            
            // Reset card buttons
            document.querySelectorAll('.card-button').forEach(btn => {
                btn.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                btn.classList.remove('selected-card');
            });
            
            showPopupMessage('Game reset! Select a card to play again.');
        }
        
        function renderCardPreview(card) {
            const container = document.getElementById('lobby-card-container');
            container.innerHTML = '';
            
            const table = document.createElement('div');
            table.className = 'lobby-table';
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'lobby-table-cell';
                    const val = card.grid[row][col];
                    cell.textContent = val === 0 ? '⭐' : val;
                    table.appendChild(cell);
                }
            }
            container.appendChild(table);
            
            const idDiv = document.createElement('div');
            idDiv.style.textAlign = 'center';
            idDiv.style.marginTop = '10px';
            idDiv.style.fontSize = '12px';
            idDiv.style.color = '#888';
            idDiv.textContent = `Board #: ${card.id}`;
            container.appendChild(idDiv);
        }
        
        function showPopupMessage(msg) {
            const popup = document.getElementById('game-popup');
            const msgEl = document.getElementById('popup-message');
            msgEl.textContent = msg;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }
        
        // Initialize
        generateAllCards();
        buildCardButtons();
        
        // Add buy button to UI
        const lobbyHeader = document.querySelector('.lobby-header');
        const buyBtnDiv = document.createElement('div');
        buyBtnDiv.className = 'lobby-info-box';
        buyBtnDiv.style.cursor = 'pointer';
        buyBtnDiv.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
        buyBtnDiv.innerHTML = `
            <div class="lobby-icon">🛒</div>
            <div class="lobby-label">BUY CARD</div>
            <div class="lobby-value">10 ETB</div>
        `;
        buyBtnDiv.onclick = buyCard;
        lobbyHeader.appendChild(buyBtnDiv);
        
        // Add bingo button listener
        document.getElementById('bingo-button').onclick = claimBingo;
        
        // Initial wallet display
        document.getElementById('lobby-wallet-value').textContent = '100';
        
        console.log('Game initialized!');
    </script>
</body>
</html>

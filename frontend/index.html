<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Bing Bingo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .hidden { display: none !important; }
        #lobby { max-width: 900px; margin: 0 auto; }
        .lobby-header {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .lobby-info-box {
            flex: 1;
            background: rgba(255,255,230,0.95);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        #lobby-timer-value { font-size: 24px; font-weight: bold; color: #e74c3c; }
        #lobby-card-ids-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px;
        }
        .card-button {
            aspect-ratio: 1;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
        }
        .locked-by-me { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .locked-by-other { background: linear-gradient(135deg, #e74c3c, #c0392b); opacity: 0.7; }
        .available { background: linear-gradient(135deg, #667eea, #764ba2); }
        #lobby-card-container {
            background: rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            min-height: 200px;
        }
        .lobby-table {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        .lobby-table-cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }
        .playroom-bingo-button {
            width: 80%;
            max-width: 300px;
            height: 55px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
    </style>
    <link rel="stylesheet" href="css/lobby.css">
    <link rel="stylesheet" href="css/playroom.css">
    <link rel="stylesheet" href="css/popup.css">
</head>
<body>
    <script src="js/telegram-web-app.js"></script>
    <script src="js/sockjs.min.js"></script>
    <script src="js/stomp.min.js"></script>
    <script src="js/confetti.browser.min.js"></script>
    <script src="js/client-session.js"></script>
    <script src="js/grid-master.js"></script>
    <script src="js/utility.js"></script>
    <script src="js/payment.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            console.log("Game starting...");
            const tg = window.Telegram?.WebApp;
            if (tg) { tg.ready(); tg.expand(); }
            
            GameSession.login();
            await fetchConfig();
            await GameSession.join();
            
            setTimeout(() => {
                const pid = localStorage.getItem("myId");
                if (pid && window.PaymentSystem) window.PaymentSystem.init(pid);
            }, 2000);
        });
    </script>

    <div id="lobby">
        <div class="lobby-header">
            <div class="lobby-info-box"><div>⏳</div><div id="lobby-timer-value">-</div></div>
            <div class="lobby-info-box"><div>👥</div><div class="lobby-label">Players</div><div id="lobby-player-count">-</div></div>
            <div class="lobby-info-box"><div>💰</div><div class="lobby-label">Wallet</div><div id="lobby-wallet-value">-</div></div>
            <div class="lobby-info-box"><div>🎲</div><div class="lobby-label">Bet</div><div id="lobby-bet-value">10</div></div>
        </div>
        <div id="lobby-card-ids-container"></div>
        <div id="lobby-card-container"></div>
    </div>

    <div id="playroom" class="hidden">
        <div class="playroom-header">
            <div>👥 Players: <span id="playroom-players">-</span></div>
            <div>💰 Jackpot: <span id="playroom-reward">-</span></div>
            <div>🎲 Bet: <span id="playroom-bet-value">10</span></div>
            <div>🔔 Called: <span id="playroom-call-count">-</span></div>
        </div>
        <div class="playroom-master-grid" id="master-grid"></div>
        <div id="playroom-status-box">SHUFFLING<span class="loader"></span></div>
        <div class="playroom-current-call">Current Call: <span id="last-call">-</span></div>
        <div id="playroom-card-container"></div>
        <button class="playroom-bingo-button" id="bingo-button">🎯 BINGO! 🎯</button>
    </div>

    <div id="game-popup" class="popup"><div id="popup-message"></div></div>
</body>
</html>

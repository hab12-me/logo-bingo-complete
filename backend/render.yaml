services:
  - type: web
    name: logo-bing-backend
    env: docker
    region: frankfurt
    plan: starter
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-netlify-app.netlify.app

databases:
  - name: logo-bing-db
    region: frankfurt
    plan: starter

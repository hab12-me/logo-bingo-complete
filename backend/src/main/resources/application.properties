# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# Database Configuration - Use separate credentials to avoid URL parsing issues
spring.datasource.url=${DB_BASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.logobing=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=LogoBingBot
telegram.bot.admin-chat-id=1765057062

# Admin IDs
admin.ids=1765057062,1044688332,6499874707

# Telebirr
telebirr.api.admin-phone-number=0931721793
telebirr.api.enable-manual-verification=true

# Payment Rules
payment.min-deposit=10
payment.max-deposit=50000
payment.min-withdrawal=10
payment.max-withdrawal=50000
payment.first-deposit-bonus-percent=10
payment.max-bonus-amount=500

# Game Configuration
game.number-of-cards=500
game.lobby-timer=30
game.game-timer=180
game.over-timer=10
game.min-bet=10
game.max-bet=1000
game.house-fee=0.10
